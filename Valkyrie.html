<input type="hidden" class="sheet-tabstoggle" name="attr_sheetTab"  value="display"  />
<div>
    <button type="action" name="act_input" >Input</button>
    <button type="action" name="act_display" >Display</button>
</div>

<div class="sheet-input">
    <div class="2colrow">
        <div class="col">
            <h3>Unit Information</h3>
            <label>Name:</label><input type="text" name="attr_character_name">
            <br>
            <label>Class:</label><input type="text" name="attr_class">
            <br>
            <label for="attr_faction">Faction:</label>
            <select name="attr_faction">
                <option value="" selected disabled hidden>Choose here</option>
                <option value="Federation">Federation</option>
                <option value="Klingon">Klingon</option>
            </select>
        </div>
        <div class="col">
            <h3>Attributes</h3>
            <label>Engine:</label><input type="text" name="attr_engine">
            <label>Reserve Track:</label><input type="type" name="attr_reservetrack">
            <label>Size:</label><input type="number" name="attr_size">
            <label>Turn Rating:</label><input type="number" name="attr_turn">
            <label>Points:</label><input type="number" name="attr_points">
            <label for="attr_type">Type:</label>
            <select name="attr_type">
                <option value="" selected disabled hidden>Choose here</option>
                <option value="Heavy Cruiser">Heavy Cruiser</option>
                <option value="Objective">Objective</option>
                <option value="Terrain">Terrain</option>
                <option value="System">System</option>
            </select>  
          </div>
    </div>    


    <div class="row">
        <h3>Systems</h3>
        <div class="systems">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Range</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input type="text" name="attr_system1name"></td>  
                        <td><input type="text" name="attr_system1range"></td> 
                    </tr>
                    <tr>
                        <td><input type="text" name="attr_system2name"></td>  
                        <td><input type="text" name="attr_system2range"></td> 
                    </tr>
                    <tr>
                        <td><input type="text" name="attr_system3name"></td>  
                        <td><input type="text" name="attr_system3range"></td> 
                    </tr>
                </tbody>
            </table>
        </div>
    </div>


    <div class="row">
        <h3>Weapons</h3>

        <div class="weapons">
            <table>
            <thead>
                <tr>
                    <th></th>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Facing</th>
                    <th>Range</th>
                    <th>Dice</th>
                    <th>Limits</th>
                </tr>
            </thead>
            <tbody>
               <tr>
                    <td>1</td>
                    <td><input type="text" name="attr_weapon1name"></td>
                    <td><input type="text" name="attr_weapon1facing"></td>
                    <td><input type="text" name="attr_weapon1range"></td>
                    <td><input type="text" name="attr_weapon1dice"></td>
                    <td><input type="text" name="attr_weapon1limits"></td>                
                </tr>
               <tr>
                    <td>2</td>
                    <td><input type="text" name="attr_weapon2name"></td>
                    <td><input type="text" name="attr_weapon2facing"></td>
                    <td><input type="text" name="attr_weapon2range"></td>
                    <td><input type="text" name="attr_weapon2dice"></td>
                    <td><input type="text" name="attr_weapon2limits"></td>                
                </tr>
               <tr>
                     <td>3</td>
                    <td><input type="text" name="attr_weapon3name"></td>
                    <td><input type="text" name="attr_weapon3facing"></td>
                    <td><input type="text" name="attr_weapon3range"></td>
                    <td><input type="text" name="attr_weapon3dice"></td>
                    <td><input type="text" name="attr_weapon3limits"></td>                 
                </tr>
               <tr>
                    <td>4</td>
                    <td><input type="text" name="attr_weapon4name"></td>
                    <td><input type="text" name="attr_weapon4facing"></td>
                    <td><input type="text" name="attr_weapon4range"></td>
                    <td><input type="text" name="attr_weapon4dice"></td>
                    <td><input type="text" name="attr_weapon4limits"></td>              
                </tr>
               <tr>
                    <td>5</td>
                    <td><input type="text" name="attr_weapon5name"></td>
                    <td><input type="text" name="attr_weapon5facing"></td>
                    <td><input type="text" name="attr_weapon5range"></td>
                    <td><input type="text" name="attr_weapon5dice"></td>
                    <td><input type="text" name="attr_weapon5limits"></td>               
                </tr>
            </tbody>
            </table>    
        </div>    
    </div>    


</div>



<div class="sheet-display">
    <input type="hidden" name="attr_faction"/>

    <div class="mysheet">
      <div class="attributes">

        <main>
        <input type="hidden" name="attr_faction"/>
          <section class="header f-center">
                <h1><span name="attr_character_name"></span></h1>
                <h3><span name="attr_class"></span> Class <span name="attr_type"></span> [Size: <span name="attr_size"></span>]</h3>
          </section>

          <section class="shields">
            <img name="attr_shieldImage">
          </section>
          

          </section>

          <section class="weapons">
            <h3>Weapons</h3>
            <div class="weaponinfo">
                <div><span>Damage</span></div>
                <div><span>Weapon</span></div>
                <div><span>Facing</span></div>
                <div><span>Range</span></div>
                <div><span>Attacks</span></div>
                <div><span>Strength</span></div>
                <div><span>Special</span></div>
            </div>


            <input type="hidden" name="attr_weapon1equipped" class="weapon1-status" value="Off">
            <div class="weapon1">
                <span> </span>
                <span> </span>
                <h4><span name="attr_weapon1name"></span></h4>
                <h4><span name="attr_weapon1facing"></span></h4>
                <h4><span name="attr_weapon1range"></span></h4>
                <h4><span name="attr_weapon1attacks"></span></h4>
                <h4><span name="attr_weapon1str"></span></h4>

            <div class="weapon2">
                <input type="checkbox" name="attr_weapon2damage1" value="1">

                <h4><span name="attr_weapon2name"></span></h4>
                <h4><span name="attr_weapon2facing"></span></h4>
                <h4><span name="attr_weapon2range"></span></h4>
                <h4><span name="attr_weapon2attacks"></span></h4>
                <h4><span name="attr_weapon2str"></span></h4>
                <h4><span name="attr_weapon2special"></span></h4>
            </div>


            <input type="hidden" name="attr_weapon3equipped" class="weapon3-status" value="Off">
            <div class="weapon3">
                <input type="checkbox" name="attr_weapon3damage1" value="1">
                <input type="checkbox" name="attr_weapon3damage2" value="1">   
                <h4><span name="attr_weapon3name"></span></h4>
                <h4><span name="attr_weapon3facing"></span></h4>
                <h4><span name="attr_weapon3range"></span></h4>
                <h4><span name="attr_weapon3attacks"></span></h4>
                <h4><span name="attr_weapon3str"></span></h4>
                <h4><span name="attr_weapon3special"></span></h4>
            </div>


            <input type="hidden" name="attr_weapon4equipped" class="weapon4-status" value="Off">
            <div class="weapon4">
                <input type="checkbox" name="attr_weapon4damage1" value="1">
                <input type="checkbox" name="attr_weapon4damage2" value="1">   
                <h4><span name="attr_weapon4name"></span></h4>
                <h4><span name="attr_weapon4facing"></span></h4>
                <h4><span name="attr_weapon4range"></span></h4>
                <h4><span name="attr_weapon4attacks"></span></h4>
                <h4><span name="attr_weapon4str"></span></h4>
                <h4><span name="attr_weapon4special"></span></h4>
            </div>


            <input type="hidden" name="attr_weapon5equipped" class="weapon5-status" value="Off">
            <div class="weapon5">
                <input type="checkbox" name="attr_weapon5damage1" value="1">
                <input type="checkbox" name="attr_weapon5damage2" value="1">   
                <h4><span name="attr_weapon5name"></span></h4>
                <h4><span name="attr_weapon5facing"></span></h4>
                <h4><span name="attr_weapon5range"></span></h4>
                <h4><span name="attr_weapon5attacks"></span></h4>
                <h4><span name="attr_weapon5str"></span></h4>
                <h4><span name="attr_weapon5special"></span></h4>
            </div>
          </section>
        </main>
      </div>
    </div>    
</div>



<script type="text/worker">
    const buttonlist = ["input","display"];
    buttonlist.forEach(button => {
        on(`clicked:${button}`, function() {
            setAttrs({
                sheetTab: button
            });
        });
    });

    on("sheet:opened", function() {
        setAttrs({sheetTab:"display"});
    });

    on("change:attrs sheet:opened", function() { 
        getAttrs(["class"], function(values) {



            setAttrs({
                
            });
        });    
    }); 


 

</script>
